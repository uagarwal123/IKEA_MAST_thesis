experiments:
  # ── Claude Sonnet 4.6 
  - name: claude-sonnet-4-6_zero_shot
    model: claude-sonnet-4-6
    backend: anthropic
    temperature: 0.0
    system_prompt:
    reasoning: false
    shots: 0
    slice_n: 3
    definitions_path: ../../../data/prompts/definitions.txt
    examples_path: ../../../data/prompts/examples.txt
    dataset_path: ../../../data/MAST-Data/MAD_full_dataset.json
    genai_project: ingka-map-services-dev
    genai_location: europe-west1
    ollama_host: http://localhost:11434
    uva_api_key: sk-

